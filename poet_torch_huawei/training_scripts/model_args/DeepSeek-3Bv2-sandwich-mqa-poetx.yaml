# DeepSeek-3B v2 (sandwich-norm + MQA) with POET-X_fast reparameterization.
#
# * Baseline: DeepSeek-3Bv2-sandwich-mqa.yaml
# * POET-X integration: every ColumnParallelLinear / RowParallelLinear in the
#   decoder outside fused grouped GEMM stacks (attention Q/K/V, attn output
#   projection, dense + routed expert MLP + shared-expert MLP) is reparameterized
#   via the **input-centric POET-X_fast path**:
#
#       x'   = x[..., perm_in_inv] @ block_diag(R_in)
#       y'   = x' @ W_0^T (+bias)
#       y    = (y' @ block_diag(R_out))[..., perm_out]
#
#   Base weights W_0 are frozen; only the Cayley-Neumann parameterized oft_R
#   factors train. Compared to the default --poet-variant poet (which
#   materializes the full (out, in) effective weight every forward), POET-X
#   never instantiates W_eff, so per-forward memory drops from O(out * in)
#   down to O(tokens * features) of rotated activations.
#
# * System-level speedups (the whole point of "POET-X_fast"):
#     1. The adapter delegates the full perm + R_in + linear + R_out + perm
#        chain to ``poet_torch.core.ops.forward_core``, which is
#        ``@torch.compile(fullgraph=True)`` -- one fused Inductor graph per
#        linear size instead of half a dozen eager kernels.
#     2. The Cayley-Neumann transform runs via the Triton op
#        ``torch.ops.poet.cayley`` (fused fwd+bwd, much faster than the
#        ``(I - A)^{-1}(I + A)`` PyTorch path).
#     3. Setting POET_MEM_EFFICIENT=1 additionally routes the chain through
#        the ``chain_layer_x_checkpoint_mem_o2`` Triton kernel, which
#        recomputes the x-rotation chain in backward -> roughly half the
#        activation memory of the chain.
#
# * Routed experts: GroupedGEMM weights are fused Parameters (not TP linears); we
#   disable --moe-grouped-gemm and pass --poet-wrap-moe-experts so experts use
#   SequentialMLP per-expert TP linears and get wrapped like the dense FFN.
# * Embeddings, the LM head and the MTP block stay unwrapped by default (see
#   ``exclude_modules`` defaults in poet_adapter.install_poet_in_model).
#
# Dimension check for ``--poet-block-size 128`` and TP=1 (must divide local
# in/out dims of every wrapped linear; moe FFN intermediate 896 is not divisible
# by 256 for expert RowParallel fc2 inputs, so block 128 instead of 256):
#   * hidden = 1280            -> 1280 / 128 = 10     OK
#   * ffn    = 7168            -> 7168 / 128 = 56    OK
#   * qkv_out = (16+2*1)*384   = 6912 -> OK
#   * proj_in = 16*384         = 6144 -> OK
#   * routed expert fc / fc out (896, fc1 doubles for SwiGLU) -> OK vs 128
#   * shared_ffn = 1792        -> OK

MODEL_ARGS:
  # Distributed args
  --use-distributed-optimizer: true
  --overlap-grad-reduce: true
  --overlap-param-gather: true

  # Training args
  --use-mcore-models: true
  --sequence-parallel: true
  --use-flash-attn: true
  --disable-bias-linear: true
  --no-save-optim: false
  --no-check-for-nan-in-loss-and-grad: false
  --cross-entropy-loss-fusion: true
  --cross-entropy-fusion-impl: native
  --manual-gc: true
  --manual-gc-interval: 10

  # Transformer Engine args
  # NOTE: we use impl=local (not transformer_engine) because TE's linear
  # classes don't subclass Megatron's ColumnParallelLinear/RowParallelLinear,
  # so POET would silently skip every layer. FlashAttention is still on via
  # --use-flash-attn below.
  #
  # Follow-up gotcha: `local` + `--normalization RMSNorm` forces Megatron to
  # pick `WrappedTorchNorm` (see megatron/core/models/backends.py: the
  # LocalSpecProvider.layer_norm branch hard-codes it for rms_norm=True),
  # which asserts `not config.persist_layer_norm`. Baseline defaults to
  # persist_layer_norm=True (for TE's persistent LN kernel); with
  # WrappedTorchNorm the flag is meaningless anyway. Pass --no-persist-layer-norm
  # so the assert passes. Sequence-parallel is already auto-disabled at TP=1
  # (arguments.py: "Disabling sequence parallelism because tensor model
  # parallelism is disabled"), so that assert doesn't fire.
  --transformer-impl: local
  --no-persist-layer-norm: true
  --no-masked-softmax-fusion: false
  --no-rope-fusion: true

  # Network size
  --num-layers: 12
  --hidden-size: 1280
  --ffn-hidden-size: 7168
  --num-attention-heads: 16
  --max-position-embeddings: 4096
  --position-embedding-type: rope
  --rotary-base: 10000
  --make-vocab-size-divisible-by: 3232
  --normalization: RMSNorm
  --norm-epsilon: 1e-6
  --swiglu: true
  --untie-embeddings-and-output-weights: true
  --use-sandwich-norm: true
  --attn-post-norm-scale: 0.03
  --ffn-post-norm-scale: 0.03

  # Regularization
  --attention-dropout: 0.0
  --hidden-dropout: 0.0
  --clip-grad: 1.0
  --weight-decay: 0.1
  --qk-layernorm: true

  # Optimizer
  --adam-beta1: 0.9
  --adam-beta2: 0.95

  # MoE: --moe-grouped-gemm omitted (SequentialMLP + --poet-wrap-moe-experts).
  --num-experts: 64
  --moe-layer-freq: ([0]*1+[1]*11)
  --moe-ffn-hidden-size: 896
  --moe-shared-expert-intermediate-size: 1792
  --moe-router-load-balancing-type: seq_aux_loss
  --moe-router-topk: 6
  --moe-aux-loss-coeff: 1e-4
  --moe-router-topk-scaling-factor: 2.5
  --moe-router-score-function: sigmoid
  --moe-router-enable-expert-bias: true
  --moe-router-bias-update-rate: 1e-3
  --moe-router-dtype: fp32
  --moe-permute-fusion: true
  --moe-router-fusion: true
  --moe-layer-recompute: true
  --moe-token-dispatcher-type: alltoall

  # MQA
  --group-query-attention: true
  --num-query-groups: 1
  --kv-channels: 384
  --rotary-percent: 0.25

  # MTP (also excluded from POET wrapping by default).
  --mtp-num-layers: 1
  --mtp-loss-scaling-factor: 0.3

  # Initialization (standard).
  --init-method-std: 0.006
  --embedding-init-method-std: 0.006

  # Logging
  --log-timers-to-tensorboard: true
  --log-memory-to-tensorboard: true
  --log-num-zeros-in-grad: false
  --log-params-norm: true
  --log-validation-ppl-to-tensorboard: true
  --log-throughput: true
  --log-interval: 1

  # Mixed precision
  --bf16: true
  --distributed-timeout-minutes: 3000
  --num-dataset-builder-threads: 8

  # --------------------------------------------------------------------
  # POET-X specific flags (consumed by pretrain_gpt_poet.py).
  # --------------------------------------------------------------------
  --use-poet: true
  --poet-variant: poetx          # <-- input-centric forward (POET-X_fast)
  --poet-wrap-moe-experts: true
  --poet-block-size: 128
  --poet-merge-interval: 200
  # --poet-mem-efficient: true   # further: recompute x-rotations in bwd (requires Triton)
  # --poet-quantize: true        # POET-XQ (INT8 base weights, requires Triton)
