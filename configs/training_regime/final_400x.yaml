# @package _global_
# Extended final budget at 400 tokens/param (SPEC.md §1.2).
training:
  tokens_per_param: 400
  global_batch_size_tokens: 4_194_304
  seq_length: 4096
  micro_batch_size: null

scheduler:
  type: wsd
  warmup_tokens: 2_000_000_000
  stable_fraction: 0.8
  decay_fraction: 0.2
  peak_lr: 0.01
  min_lr_ratio: 0.1
  decay_shape: "linear"

checkpointing:
  save_every_tokens: 20_000_000_000
  keep_last: 5
  save_stable_stage_final: true
