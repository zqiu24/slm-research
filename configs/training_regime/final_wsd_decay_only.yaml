# @package _global_
# Decay-only regime: resumes from a stable-stage checkpoint and runs only
# the decay phase. Cuts compute for decay-stage ablations (data mix, decay
# shape) that don't touch the stable stage (SPEC.md §7.1).
training:
  tokens_per_param: null             # derived from resume-from checkpoint
  global_batch_size_tokens: 4_194_304
  micro_batch_size: null
  resume_from_stable_stage: true     # required: checkpoint must exist
  decay_tokens: null                 # set explicitly at launch (e.g. decay_tokens=1_200_000_000)
  stable_checkpoint_dir: null        # set at launch: the stable run's checkpoints dir

checkpointing:
  save_every_tokens: 2_000_000_000
  keep_last: 3
  save_stable_stage_final: false     # already exists; don't overwrite
