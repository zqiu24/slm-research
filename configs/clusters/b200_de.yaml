# @package _global_
# B200 is the only cluster advertising FP4.
cluster:
  name: b200_de
  site: germany
  nodes: 1
  gpus_per_node: 8
  interconnect: "nvlink_within_ib_across"
  capabilities: [bf16, fp16, fp8, fp4, nvlink, ib_fast]
  transformer_engine_version: "1.12.0"
  cuda_version: "12.6"
  pytorch_version: "2.5.0"
  wandb_offline: false                 # internet-capable; log to wandb online
  slurm_partition: "b200"
  slurm_account: "research"
  slurm_template: "launchers/slurm/bid_cluster.sbatch.j2"

parallelism:
  tp_size_rules:
    - { model_params_lt: 3.0e9,  tp: 1, pp: 1 }
    - { model_params_lt: 1.0e10, tp: 4, pp: 1 }
    - { model_params_lt: 3.0e10, tp: 8, pp: 1 }
  sequence_parallel: true
  distributed_optimizer: true

precision:
  default: fp8
  fp8_recipe: "delayed_scaling"
  bf16_fallback: true
