# @package _global_
# Current champion baseline. Overwritten at each promotion event
# (SPEC.md §11). Matching this exactly -> config_diff_from_champion == "champion".
# No champion has been crowned yet, so this slot holds the plain AdamW
# baseline and runs are named `adam-...` (not `champion-...`). The file name
# stays champion.yaml -- it is the diff reference (`_load_champion_for`).
experiment:
  name: adam
  family: optim
  description: |
    Baseline: AdamW on all parameters, cosine LR schedule with linear warmup,
    standard SwiGLU / GQA / RMSNorm architecture from the active base family.
    No behavioral patches (only a logging-only ETA patch).
  references:
    - "Hu et al. 2024 (arXiv:2404.06395) — MiniCPM"
  patches:
    - training_log_eta        # prepend "ETA: HhMMm" to the per-iteration log
    - wandb_metric_normalize  # canonicalize W&B metric keys + add tokens_seen / step_time
  required_capabilities: []

optim:
  type: adamw
  lr: 1.0e-3
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
