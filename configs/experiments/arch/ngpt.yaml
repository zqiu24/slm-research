# @package _global_
# nGPT (Normalized Transformer on the Hypersphere). See arXiv:2410.01131.
#
# Triggers patches: ngpt_apply_spec, ngpt_normalize_step, ngpt_optimizer_setup.
experiment:
  name: ngpt
  family: arch
  kind: ngpt
  description: |
    nGPT — every attention/MLP/embedding matrix lives on the unit
    hypersphere; per-step L2 projection enforces that geometrically.
    Residual blocks use a learnable eigen-LR blend instead of additive
    residuals. Q/K are L2-normalized per head; softmax_scale is
    sqrt(head_dim) (not 1/sqrt(head_dim)). Output logits are
    multiplied by a learnable per-vocab scale `sz`.
  references:
    - "Loshchilov et al. 2024 (arXiv:2410.01131)"
    - "Reference: https://github.com/NVIDIA/ngpt"
  patches:
    - model_unfuse_linears    # unfuse fused qkv/fc1 at build time (pre-DDP)
    - ngpt_apply_spec
    - ngpt_normalize_step
    - ngpt_optimizer_setup
    - training_log_eta        # prepend "ETA: HhMMm" to the per-iteration log
    - wandb_metric_normalize  # canonicalize W&B metric keys + add tokens_seen / step_time
  required_capabilities: []

optim:
  type: ngpt_adamw
  lr: 15.0e-4                # reference train.py:98
  weight_decay: 0.0          # scaling params are also zero-WD by patch
  betas: [0.9, 0.95]
  eps: 1.0e-8
  ngpt:
    alpha_init: 0.05         # attn_alpha / mlp_alpha init_value
    sqk_init: 1.0
    suv_init: 1.0
    sz_init: 1.0
    no_warmup: true          # reference train.py:114

# Disable QK layernorm and dropout — they conflict with nGPT.
# Force MHA (num_query_groups == num_attention_heads): the reference nGPT
# (NVIDIA/ngpt model.py:119-129) is MHA-only — sqk has shape (n_head*d)
# and is applied identically to Q and K. GQA would need a per-KV-group
# sqk_k vector, which the paper does not specify; staying MHA preserves
# parity with the published recipe.
base:
  model:
    qk_norm: false
    attention_dropout: 0.0
    hidden_dropout: 0.0
    num_query_groups: ${base.model.num_attention_heads}
    # Unfuse into separate projections for parity with the adam/muon baselines.
    # qkv: split by the model_unfuse_linears patch (preserves sqk via q/k_layernorm).
    # fc1: NGPTMLP builds split u/v natively from config.unfuse_fc1 (the generic
    # unfuse can't handle nGPT's suv + [u|v] packing). Both are weight-norm
    # registered; fused and unfused nGPT are the same model (row-norm is
    # fusion-invariant). See docs/superpowers/plans/2026-06-16-ngpt-unfuse.md.
    unfuse_qkv: true
    unfuse_fc1: true
