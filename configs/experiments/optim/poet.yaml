# @package _global_
# POET: Parameter-Efficient Orthogonal Training.
#
# Replaces 2D linear params with POETLinear (frozen base weight + block-
# orthogonal delta), trains only the orthogonal piece (via stock Megatron Adam
# by default; optim.poet.use_poet_adam=true for the custom POETAdam path), and
# periodically merges deltas + resets Adam momentum.
#
# Triggers patches: model_unfuse_linears, poet_unfuse_te_impl,
# poet_apply_to_model, poet_merge_step.
experiment:
  name: poet
  family: optim
  description: |
    POET (Parameter-Efficient Orthogonal Training). Block-orthogonal
    parameterisation of 2D linear weights — POETLinear holds a frozen base
    weight and a low-rank orthogonal delta (``oft_R``). Only ``oft_R`` is
    trained — by default via the stock Megatron Adam optimizer (oft_R LR scaled
    by ``scale``, momentum reset by the poet_merge_step hook); set
    ``optim.poet.use_poet_adam=true`` for the legacy custom POETAdam path.
    Every ``poet_merge_period`` steps the delta is
    merged into the base weight, the permutations re-randomised, and Adam's
    first/second-moment buffers reset. Hypothesis: matches dense Adam on
    perplexity while leaving rotational symmetry exact under SGD.
  references:
    - "POET"
  patches:
    - model_unfuse_linears    # unfuse fused qkv/fc1 at build time (pre-DDP)
    - poet_optimizer_setup
    - poet_unfuse_te_impl
    - poet_apply_to_model
    - poet_merge_step
    - training_log_eta        # prepend "ETA: HhMMm" to the per-iteration log
    - wandb_metric_normalize  # canonicalize W&B metric keys + add tokens_seen / step_time
  required_capabilities: []

optim:
  type: poet
  lr: 1.0e-3              # base LR for nonlinear params (Adam side)
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8
  poet:
    # Provide EITHER block_size OR block_count, not both.
    #   block_size: one shared block size on both sides; must divide in & out.
    #   block_count: each side gets `n` blocks → block_size_in = in/n,
    #     block_size_out = out/n (may differ). Better for non-square FFN layers.
    block_size: 512
    # block_count: 4       # uncomment to use decoupled block sizes instead.
    cache_mode: none       # "none" | "cached_fwd_bwd". Measured dead-end: skew+Cayley is only ~8% of a microbatch (controlled A/B, tools/poet_cache_bench.py), and the per-cycle VJP flush (~0.9ms) eats the savings -> cached is SLOWER at K<=8, ~3% faster at K=16. The cost is the per-token rotation/gather chain, which caching can't touch.
    init_type: normalized   # "none" | "normalized" | "mup_normalized"
    mup_alpha: 1.0
    merge_period: 400       # 0 disables periodic merge
    scale: 1.0              # LR multiplier for the POET linear group
    # Optimizer impl. DEFAULT (false): stock Megatron Adam — oft_R is a normal
    # trainable param in the DDP grad buffer, its LR is scaled by `scale` via a
    # param-group override, and its Adam momentum is reset by the poet_merge_step
    # hook. Set true for the legacy custom POETAdam + ChainedOptimizer path
    # (also required for cache_mode=cached_fwd_bwd, which is a measured dead-end
    # for our K -- see cache_mode note above).
    use_poet_adam: false
    # Orthogonalization map for the block rotation G = f(Q):
    #   "cayley" (default): truncated Cayley/Neumann polynomial (poet::cayley
    #     Triton op). Cheap matmuls; approximate orthogonality; angle = 2*arctan.
    #   "exp": exact matrix exponential G = exp(Q) (torch.linalg.matrix_exp).
    #     Exactly orthogonal for any Q; angle = singular value of Q (no factor
    #     of 2, no ||Q||<1 ceiling). Heavier backward; cache_mode must be "none".
    parameterization: cayley
    # Train both block rotations by default. Set false to FREEZE the output-side
    # rotation (oft_R_out) at identity — it inits to zero, so freezing leaves
    # R_out = I and only the input-side rotation (oft_R_in) is learned: a single-
    # sided POET ablation. Frozen pre-DDP, so oft_R_out is excluded from the grad
    # buffer + optimizer. See scripts/train_poet_dev_full_single.sh.
    train_output_rotation: true

# Architectural unfusing of fused linears (handled by the model_unfuse_linears
# patch, optimizer-agnostic — lives under base.model, not optim.poet). Defaulted
# on for POET so each Q/K/V and gate/up projection gets its own orthogonal orbit.
# Each produced sub-segment must be divisible by poet.block_size/block_count or
# POET hard-errors at startup (e.g. MoE moe_ffn_hidden_size=896 needs block_size
# dividing 896, not 256). Set these false, or pick a compatible block_size, to
# opt out. unfuse_qkv is inert for MLA (no fused linear_qkv).
base:
  model:
    unfuse_qkv: true
    unfuse_fc1: true
