# @package _global_
# POET: Parameter-Efficient Orthogonal Training.
#
# Replaces 2D linear params with POETLinear (frozen base weight + block-
# orthogonal delta), trains only the orthogonal piece via POETAdam, and
# periodically merges deltas + resets Adam momentum.
#
# Triggers patches: poet_unfuse_te_impl, poet_apply_to_model, poet_merge_step.
experiment:
  name: poet
  family: optim
  description: |
    POET (Parameter-Efficient Orthogonal Training). Block-orthogonal
    parameterisation of 2D linear weights — POETLinear holds a frozen base
    weight and a low-rank orthogonal delta (``oft_R``). Only ``oft_R`` is
    trained, via POETAdam. Every ``poet_merge_period`` steps the delta is
    merged into the base weight, the permutations re-randomised, and Adam's
    first/second-moment buffers reset. Hypothesis: matches dense Adam on
    perplexity while leaving rotational symmetry exact under SGD.
  references:
    - "POET / GaLore (Zhao et al. 2024)"
  patches:
    - poet_optimizer_setup
    - poet_unfuse_te_impl
    - poet_apply_to_model
    - poet_merge_step
    - training_log_eta        # prepend "ETA: HhMMm" to the per-iteration log
  required_capabilities: []

optim:
  type: poet
  lr: 3.0e-4              # base LR for nonlinear params (Adam side)
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8
  poet:
    # Provide EITHER block_size OR block_count, not both.
    #   block_size: one shared block size on both sides; must divide in & out.
    #   block_count: each side gets `n` blocks → block_size_in = in/n,
    #     block_size_out = out/n (may differ). Better for non-square FFN layers.
    block_size: 256
    # block_count: 8       # uncomment to use decoupled block sizes instead.
    cache_mode: cached_fwd_bwd  # "none" | "cached_fwd_bwd" — caches the Cayley fwd+bwd across the K microbatches of a gradient-accumulation cycle. Override with optim.poet.cache_mode=none.
    init_type: normalized   # "none" | "normalized" | "mup_normalized"
    mup_alpha: 1.0
    merge_period: 200       # 0 disables periodic merge
    scale: 1.0              # LR multiplier for the POET linear group
    # Split fused linears into separate POET orbits (only meaningful under POET).
    # split_qkv: fused attention linear_qkv -> separate Q / K / V projections
    #   (GQA-correct de-interleave; inert for MLA, which has no fused linear_qkv).
    # split_fc1: fused SwiGLU linear_fc1 -> separate gate / up projections.
    # Each produced sub-segment must be divisible by block_size/block_count or
    # training hard-errors at startup. NOTE: defaulted on — for MoE, block_size
    # must divide moe_ffn_hidden_size (e.g. 896 needs block_size dividing 896,
    # not 256), or set split_fc1=false / pick a compatible block_size.
    split_qkv: true
    split_fc1: true
