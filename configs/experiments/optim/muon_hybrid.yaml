# @package _global_
# Selector/file stays `muon_hybrid` (and optim.type below); the display name
# is `muon` so runs are named `muon-...`.
experiment:
  name: muon
  family: optim
  description: |
    Muon on linear weights, Adam on embeddings, norms, biases, and LM head.
    Separate LR schedules per group. Hypothesis: orthogonal Newton-Schulz
    update is beneficial for dense weight matrices but unstable for 1D params.
  references:
    - "Jordan 2024 Muon blog post"
    - "Moonlight paper arXiv:2502.16982"
  patches:
    - model_unfuse_linears    # unfuse fused qkv/fc1 at build time (pre-DDP)
    - sandwich_norm_apply     # no-op unless base.model.use_sandwich_norm
    - training_log_eta        # prepend "ETA: HhMMm" to the per-iteration log
    - wandb_metric_normalize  # canonicalize W&B metric keys + add tokens_seen / step_time
  required_capabilities: []

optim:
  type: muon_hybrid
  muon_momentum: 0.95
  muon_scale_mode: spectral
  muon_tp_mode: blockwise
  muon_extra_scale_factor: 1.0
  muon_coefficient_type: quintic
  muon_scalar_optimizer: adam
  muon:
    apply_to: linear_weights
    ns_steps: 5
    ns_coeffs: [3.4445, -4.7750, 2.0315]
    lr: 2.0e-3
  adam:
    apply_to: [embedding, norm, bias, lm_head]
    lr: 1.0e-3
    betas: [0.9, 0.95]
    eps: 1.0e-8

# Unfuse fused qkv/fc1 into separate projections (forward-equivalent; Muon
# trains each 2D sub-weight like any other linear). Applied by the
# model_unfuse_linears patch above.
base:
  model:
    unfuse_qkv: true
    unfuse_fc1: true
    transformer_impl: transformer_engine
    cuda_graph_impl: transformer_engine
