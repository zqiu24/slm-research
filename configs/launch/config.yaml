# @package _global_
# Top-level Hydra-like entry config. `python -m launchers.submit` composes
# the axes below, then applies CLI overrides.
defaults:
  - base/family: qwen3
  - base/scale: 1_2b
  - scheduler: cosine
  - experiment: champion
  - training_regime: ablation_20x
  - cluster: b200_de
  - data: nemotron_cc_v2_llama31_8b
  - _self_

seed: 42

# Training backend. `megatron` (default) drives third_party/Megatron-LM via
# launchers.train_megatron; `torchtitan` drives third_party/torchtitan via
# launchers.train_torchtitan. Part of the resolved config so it is archived
# and shows up in the per-run name.
backend: megatron

wandb:
  # null -> wandb uses the logged-in account's default (personal) namespace.
  # Set a team slug here (or override wandb.entity=<team>) once it's accessible.
  entity: null
  project: "slm-${oc.env:USER,unknown}"
  job_type: "sandbox"

allow_dirty: false

_derived: {}
