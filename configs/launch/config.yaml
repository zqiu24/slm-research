# @package _global_
# Top-level Hydra entry config. `python -m launchers.submit` composes
# the six axes listed in SPEC.md §5.1 on top of this file.
#
# Override any axis from the CLI, e.g.:
#   python -m launchers.submit \
#       base/family=qwen3 base/scale=1_2b \
#       experiment=optim/muon_hybrid \
#       training_regime=ablation_20x \
#       cluster=h800_cn seed=42
defaults:
  - base/family: qwen3
  - base/scale: 1_2b
  - experiment: champion
  - training_regime: ablation_20x
  - cluster: h800_cn
  - _self_

seed: 42

wandb:
  entity: "neckariumai-research"
  project: "sandbox-${oc.env:USER,unknown}"
  job_type: "sandbox"                  # override: ablation | promotion_gate | final | ...

data:
  # Path to pre-tokenized shards + manifest. Overridden per cluster.env in practice.
  path: "/data/slm-pretrain-v1"
  expected_manifest_hash: null         # set per dataset version

# Set to true to skip the git-dirty check (only allowed for sandbox projects).
allow_dirty: false

_derived: {}                           # populated by launcher
