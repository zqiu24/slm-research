# @package _global_
# Nemotron-H mechanisms realized at the 600M non-embedding budget
# (arch bake-off; docs/experiments/arch_bakeoff_600m.md). Sized by
# tools/size_check.py: total 601.4M (+0.23%); dense (active == total).
# Pattern: A+B+A+B = (13-char "M-M-M-M-M-M*-") + (11-char "M-M-M-M-M*-") × 2,
# = 48 layers, 22 M / 22 - / 4 * (even Mamba/FFN split per §2.1).
# §2.1 constraints: a) first=Mamba, b) last=FFN,
# c) each * immediately followed by - (Attn always precedes FFN),
# d) M directly precedes each * (matches Figure 2 [M][Attn][FFN] triple).
# ffn_hidden_size trimmed 5632→5504 to re-fit budget after pattern fix.
base:
  scale: "600m_nemotron_h"
  non_embedding_params: 600_000_000
  model:
    num_layers: 48
    hidden_size: 1280
    ffn_hidden_size: 5504
    num_attention_heads: 10
    num_query_groups: 2            # GQA 5:1 on the 4 attention layers
    head_dim: 128
    seq_length: 4096
    tie_embeddings: true
    hybrid_layer_pattern: "M-M-M-M-M-M*-M-M-M-M-M*-M-M-M-M-M-M*-M-M-M-M-M*-"
