# @package _global_
# MiniCPM-style dense GQA transformer at the 1B non-embedding budget
# (dense-architecture bake-off; docs/experiments/arch_bakeoff_600m.md). Shares
# the param-matched dense shape with 1b_qwen3 / 1b_llama3; the family file
# carries the architectural deltas (depth-scaled init, scaled init_method_std,
# rope base 10k). Sized by tools/size_check.py.
base:
  scale: "1b_minicpm"
  non_embedding_params: 1_000_000_000
  model:
    num_layers: 48
    hidden_size: 1536
    ffn_hidden_size: 3328
    num_attention_heads: 24
    num_query_groups: 4          # GQA 6:1
    head_dim: 64
    seq_length: 4096
    tie_embeddings: true
