# @package _global_
# Dense DeepSeek-V3 realized at the 1B non-embedding budget (arch bake-off;
# docs/experiments/arch_bakeoff_600m.md). Same MLA + MTP mechanisms as
# 600m_deepseek_v3_dense, scaled up (hidden 1024 -> 1280, 24 -> 32 layers,
# q_lora 384 -> 512); MoE is off, so all layers carry a dense SwiGLU MLP sized
# to hit the budget. Dense -> active == total. Sized by tools/size_check.py.
base:
  scale: "1b_deepseek_v3_dense"
  non_embedding_params: 1_000_000_000
  model:
    num_layers: 32
    hidden_size: 1280
    ffn_hidden_size: 6912          # dense FFN on every layer (sized to budget)
    num_attention_heads: 16
    num_query_groups: 16           # MLA path; no GQA grouping
    head_dim: 64
    seq_length: 4096
    tie_embeddings: true
    q_lora_rank: 512
    kv_lora_rank: 256
    qk_head_dim: 64
    qk_pos_emb_head_dim: 32
    v_head_dim: 64
    # Override family YaRN params: factor=40 is for 128K context extension
    # (DSV3 §4.3), not applicable to from-scratch 4K pre-training.
    rotary_scaling_factor: null
    mscale: null
    mscale_all_dim: null
