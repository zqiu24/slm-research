# @package _global_
base:
  family: llama3
  family_version: "3.1"
  reference: "Dubey et al. 2024 (arXiv:2407.21783)"
  model:
    normalization: "RMSNorm"
    norm_epsilon: 1.0e-5
    activation: "SwiGLU"
    positional_encoding: "rope"
    rotary_base: 500000
    rotary_scaling: null
    qk_norm: false
    attention_dropout: 0.0
    hidden_dropout: 0.0
    init_method_std: 0.02
    depth_scaled_init: false
  tokenizer:
    nominal_name: "llama3"
    nominal_vocab_size: 128256
