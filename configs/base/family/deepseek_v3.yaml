# @package _global_
base:
  family: deepseek_v3
  family_version: "v3_proxy"
  reference: "DeepSeek-V3 style MLA + MoE config from Megatron functional proxy"
  model:
    normalization: "RMSNorm"
    norm_epsilon: 1.0e-6
    activation: "SwiGLU"
    positional_encoding: "rope"
    rotary_base: 10000
    rotary_scaling: null
    qk_norm: true
    attention_dropout: 0.0
    hidden_dropout: 0.0
    init_method_std: 0.02
    depth_scaled_init: false
    attention_backend: "flash"
    multi_latent_attention: true
    q_lora_rank: 1536
    kv_lora_rank: 512
    qk_head_dim: 128
    qk_pos_emb_head_dim: 64
    v_head_dim: 128
    rotary_scaling_factor: 40
    mscale: 1.0
    mscale_all_dim: 1.0
    mtp_num_layers: 1
    mtp_loss_scaling_factor: 0.1
    moe:
      enabled: true
      num_experts: 64
      layer_freq: "([0]*3+[1]*11)"
      ffn_hidden_size: 2048
      shared_expert_intermediate_size: 2048
      router_load_balancing_type: "seq_aux_loss"
      router_topk: 8
      token_dispatcher_type: "flex"
      enable_deepep: true
      router_pre_softmax: true
      grouped_gemm: true
      aux_loss_coeff: 1.0e-4
      router_group_topk: 4
      router_num_groups: 8
      router_topk_scaling_factor: 2.5
      router_score_function: "sigmoid"
      router_enable_expert_bias: true
      router_bias_update_rate: 1.0e-3
      router_dtype: "fp32"
      permute_fusion: true
  tokenizer:
    nominal_name: "deepseek-v3"
    nominal_vocab_size: 129280
